name: DemonBreathing
version: 1.2.0
main: com.demonbreathing.DemonBreathingPlugin
api-version: '1.21'
authors: [Codex]
description: Cinematic Demon Slayer inspired breathing PvP system.
commands:
  breathing:
    description: Breathing control command.
    usage: /breathing <select|withdraw|info|abilities|reload|altar|katana|core|spin>
    aliases: [db]
permissions:
  demonbreathing.admin:
    default: op
  demonbreathing.withdraw:
    default: true
